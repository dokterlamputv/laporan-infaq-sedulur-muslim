<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 30px 15px; }
        .container { max-width: 450px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 20px; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn-aksi { background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; margin-top: 10px; }
        .btn-aksi:hover { background-color: #219653; }
        .btn-aksi:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-kembali { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #7f8c8d; text-decoration: none; }
        #box-admin-utama { display: none; }
        #box-login-pin { display: block; }

        /* Trik CSS agar input type="number" / "tel" tampil bulat-bulat rahasia seperti password */
        .input-pin-keypad {
            text-align: center; 
            font-size: 24px; 
            letter-spacing: 8px;
            -webkit-text-security: disc; /* Untuk Chrome, Safari, Android Browser */
            text-security: disc;
        }
    </style>
</head>
<body>

    <div class="container" id="box-login-pin">
        <h1>Keamanan Admin</h1>
        <div class="form-group">
            <label>Masukkan PIN Akses</label>
            <input type="tel" id="input-pin" class="input-pin-keypad" placeholder="••••••" inputmode="numeric" pattern="[0-9]*" required autocomplete="off">
        </div>
        <button type="button" class="btn-aksi" onclick="cekPin()">Masuk Panel</button>
        <a href="index.html" class="btn-kembali">← Kembali ke Halaman Utama</a>
    </div>

    <div class="container" id="box-admin-utama">
        <h1>Panel Input Kas Infaq</h1>
        
        <form id="form-infaq">
            <div class="form-group">
                <label>Tanggal Transaksi</label>
                <input type="date" id="form-tanggal" required>
            </div>
            <div class="form-group">
                <label>Jenis Transaksi</label>
                <select id="form-jenis">
                    <option value="Masuk">Infaq Masuk (Pemasukan)</option>
                    <option value="Keluar">Pengeluaran Kas</option>
                </select>
            </div>
            <div class="form-group">
                <label>Keterangan</label>
                <input type="text" id="form-keterangan" placeholder="Contoh: Hamba Alloh / Beli Karpet" required>
            </div>
            <div class="form-group">
                <label>Jumlah (Angka Saja)</label>
                <input type="number" id="form-jumlah" placeholder="Contoh: 50000" required>
            </div>
            
            <button type="submit" class="btn-aksi" id="btn-submit-data">Simpan ke GitHub</button>
            <button type="button" class="btn-kembali" onclick="logoutAdmin()" style="background: none; border: none; cursor: pointer; width: 100%;">🔒 Kunci & Keluar Panel</button>
        </form>
    </div>

    <script>
        // GANTI DENGAN URL LIVE WORKER CLOUDFLARE ANDA
        const URL_API_WORKER = "https://laporan-infaq-sedulur-muslim.USERNAME_ANDA.workers.dev";

        let pinTerverifikasi = "";

        function cekPin() {
            const pinSaran = document.getElementById('input-pin').value;
            if (pinSaran === "234123") {
                pinTerverifikasi = pinSaran;
                document.getElementById('box-login-pin').style.display = 'none';
                document.getElementById('box-admin-utama').style.display = 'block';
                document.getElementById('form-tanggal').valueAsDate = new Date();
            } else {
                alert("PIN salah! Akses ditolak.");
                document.getElementById('input-pin').value = "";
            }
        }

        function logoutAdmin() {
            pinTerverifikasi = "";
            document.getElementById('input-pin').value = "";
            document.getElementById('box-admin-utama').style.display = 'none';
            document.getElementById('box-login-pin').style.display = 'block';
        }

        document.getElementById('form-infaq').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const tombol = document.getElementById('btn-submit-data');
            tombol.innerText = "Sedang Menyimpan...";
            tombol.disabled = true;

            const payload = {
                tanggal: document.getElementById('form-tanggal').value,
                jenis: document.getElementById('form-jenis').value,
                keterangan: document.getElementById('form-keterangan').value,
                jumlah: document.getElementById('form-jumlah').value,
                pin_admin: pinTerverifikasi
            };

            try {
                const respon = await fetch(URL_API_WORKER, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const hasil = await respon.json();
                if (hasil.status === "sukses") {
                    alert("Alhamdulillah, data kas berhasil disimpan!");
                    document.getElementById('form-keterangan').value = "";
                    document.getElementById('form-jumlah').value = "";
                } else {
                    alert("Gagal: " + hasil.pesan);
                    if(hasil.pesan.includes("PIN")) logoutAdmin();
                }
            } catch (err) {
                alert("Koneksi ke Worker gagal. Pastikan URL Worker benar.");
            } finally {
                tombol.innerText = "Simpan ke GitHub";
                tombol.disabled = false;
            }
        });
    </script>
</body>
</html>
